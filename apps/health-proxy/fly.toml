# fly.toml app configuration file generated for shinzo-health-proxy on 2026-03-31T18:48:52+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shinzo-health-proxy'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
